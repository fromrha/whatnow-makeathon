packages:
  - '.'
supportedArchitectures:
  os:
    - linux
    - win32
    - darwin
  cpu:
    - x64
    - arm64
  libc:
    - glibc
# Native build scripts required by Vite + Tailwind v4, allowlisted so a fresh
# `pnpm install` produces a runnable local dev/build (added in the IDE pass).
# `allowBuilds` is the key pnpm 10/11 uses; `onlyBuiltDependencies` is kept as a
# fallback for other pnpm versions.
allowBuilds:
  esbuild: true
  '@tailwindcss/oxide': true
onlyBuiltDependencies:
  - esbuild
  - '@tailwindcss/oxide'
# Moved from package.json's (now ignored) "pnpm.overrides" field. Pins vite
# across the tree to the version Figma Make targets.
overrides:
  vite: 6.3.5
